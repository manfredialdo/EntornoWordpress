<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi IA Local con Ollama</title>
    <!-- Bootstrap para diseño rápido -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .chat-container { max-width: 600px; margin: 50px auto; }
        .response-box { background: white; min-height: 100px; border-radius: 8px; padding: 15px; border: 1px solid #dee2e6; }
    </style>
</head>
<body>

    <div class="container chat-container">
        <h2 class="text-center mb-4">🤖 Consulta a Llama 3.2</h2>
        
        <div class="mb-3">
            <label for="userPrompt" class="form-label">Escribe tu pregunta:</label>
            <textarea class="form-control" id="userPrompt" rows="3" placeholder="¿Cómo funciona una API?"></textarea>
        </div>
        
        <button id="sendBtn" class="btn btn-primary w-100 mb-4">Preguntar a la IA</button>
        
        <h4>Respuesta:</h4>
        <div id="output" class="response-box text-muted">Aquí aparecerá la respuesta de tu IA local...</div>
    </div>

    <script>
        document.getElementById('sendBtn').addEventListener('click', async () => {
            const promptInput = document.getElementById('userPrompt');
            const outputDiv = document.getElementById('output');
            const prompt = promptInput.value.trim();

            if (!prompt) return alert("Por favor, escribe algo primero.");

            // Estado de carga
            outputDiv.innerText = "Pensando... (esto puede tardar unos segundos en CPU)";
            outputDiv.classList.add("text-primary");

            try {
                // Petición POST a nuestro backend de Flask
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });

                const data = await response.json();

                if (response.ok) {
                    outputDiv.innerText = data.response;
                    outputDiv.classList.remove("text-muted", "text-primary");
                } else {
                    outputDiv.innerText = `Error: ${data.error}`;
                    outputDiv.classList.add("text-danger");
                }
            } catch (error) {
                outputDiv.innerText = "Error de conexión con el servidor Flask.";
                outputDiv.classList.add("text-danger");
            }
        });
    </script>
</body>
</html>
